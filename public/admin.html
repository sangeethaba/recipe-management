<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #1d3557, #457b9d);
    color: #fff;
  }

  header {
    background: #1d3557;
    padding: 15px;
    font-size: 22px;
  }

  main {
    padding: 20px;
  }

  #recipesContainer {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 15px;
  }

  .card {
    background: #fff;
    color: #000;
    padding: 12px;
    border-radius: 10px;
    transition: 0.3s;
  }

  .card:hover {
    transform: scale(1.05);
    cursor: pointer;
    background: #f1faee;
  }

  form {
    background: #fff;
    color: #000;
    padding: 15px;
    margin-top: 20px;
    border-radius: 10px;
  }

  input, select, textarea {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
  }

  button {
    background: #06d6a0;
    color: #fff;
    border: none;
    padding: 10px;
    cursor: pointer;
  }

  #selectedRecipe {
    margin-top: 20px;
    background: #fff;
    color: #000;
    padding: 15px;
    border-radius: 10px;
  }
</style>
</head>

<body>

<header>Admin Dashboard</header>

<main>

<h3>My Recipes</h3>
<div id="recipesContainer"></div>

<div id="selectedRecipe"></div>

<h3>Add Ingredient</h3>
<form id="ingredientForm">
  <input id="ingredientName" placeholder="Ingredient Name" required />
  <select id="ingredientCategory">
    <option>Vegetable</option>
    <option>Fruit</option>
    <option>Dairy</option>
    <option>Meat</option>
    <option>Grain</option>
    <option>Spice</option>
    <option>Other</option>
  </select>
  <button type="submit">Add Ingredient</button>
</form>

<h3>Add Recipe</h3>
<form id="recipeForm">

  <input id="recipeName" placeholder="Recipe Name" required />

  <select id="difficulty">
    <option>Easy</option>
    <option>Medium</option>
    <option>Hard</option>
  </select>

  <input id="prepTime" placeholder="Prep Time" />
  <input id="cookTime" placeholder="Cook Time" />
  <input id="servings" value="4" />

  <textarea id="instructions" placeholder="Instructions"></textarea>

  <h4>Select Ingredients</h4>

  <select id="ingredientSelect"></select>
  <input id="quantity" placeholder="Quantity" />
  <input id="unit" placeholder="Unit (g/ml)" />
  <button type="button" onclick="addIngredient()">Add Ingredient</button>

  <ul id="ingredientList"></ul>

  <button type="submit">Add Recipe</button>

</form>

</main>

<script src="admin.js"></script>

</body>
</html>
