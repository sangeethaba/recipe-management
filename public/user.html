<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>User Dashboard - Digital Cookbook</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0; padding: 0; background: #fafafa; color: #333;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  header {
    background: #2c5530; color: white;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  main {
    flex-grow: 1;
    padding: 2rem;
  }
  button#logoutBtn {
    background: #b42e2e;
    border: none;
    padding: 8px 16px;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }
  button#logoutBtn:hover {
    background: #8a2222;
  }
  .recipe-list {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(240px,1fr));
    gap: 1rem;
  }
  .recipe-card {
    background: white;
    border-radius: 6px;
    box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
    padding: 1rem;
    cursor: pointer;
    transition: box-shadow 0.3s ease;
  }
  .recipe-card:hover {
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  .recipe-card h3 {
    margin-top: 0; margin-bottom: 0.5rem;
  }

  /* Modal styles */
  #recipeModal {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
    padding: 2rem;
  }
  #recipeModal.active {
    display: flex;
  }
  #recipeModalContent {
    background: white;
    padding: 1.5rem;
    border-radius: 10px;
    max-width: 700px;
    max-height: 90vh;
    overflow-y: auto;
    color: #333;
  }
  #modalCloseBtn {
    background: #b42e2e;
    border: none;
    color: white;
    padding: 6px 12px;
    float: right;
    cursor: pointer;
    border-radius: 6px;
  }
  #modalTitle {
    margin-top: 0;
  }
  #ingredientsList li {
    margin-bottom: 0.3rem;
  }
  #reviewsList .review-card {
    border-bottom: 1px solid #ddd;
    padding: 0.5rem 0;
  }
  .rating {
    color: #fbbf24;
  }
  .difficulty {
    font-weight: 700;
    text-transform: uppercase;
    margin-right: 0.5rem;
  }
  .difficulty.easy { color: #34a853; }
  .difficulty.medium { color: #fbbc04; }
  .difficulty.hard { color: #ea4335; }
</style>
</head>
<body>
<header style="display:flex; justify-content:space-between; align-items:center; background:#2c5530; color:white; padding:0.75rem 1.5rem;">
  <div>
    <strong>Digital Cookbook</strong>
    <span style="margin-left:1rem;">Welcome, <span id="usernameDisplay"></span></span>
  </div>
  <nav style="display:flex; gap:1rem; align-items:center;">
    <a href="#recipeSection" style="color:white; text-decoration:none;">🍽 Recipes</a>
    <button id="leaderboardNav" style="background:transparent; border:1px solid #fff; border-radius:4px; color:#fff; padding:4px 8px; cursor:pointer;">🏆 Leaderboard</button>
    <button id="logoutBtn" style="background:#b42e2e; border:none; padding:6px 12px; color:white; border-radius:6px; cursor:pointer; font-weight:bold;">Logout</button>
  </nav>
</header>
<main>
  <h2 id="recipeSection">Browse Recipes</h2>

  <!-- Search Filters -->
  <div id="searchBar" style="margin-bottom:1rem; display:flex; flex-wrap:wrap; gap:0.5rem; align-items:flex-end;">
    <div>
      <label for="searchName">Name</label><br />
      <input id="searchName" type="text" placeholder="e.g. Pizza" />
    </div>
    <div>
      <label for="searchCuisine">Cuisine</label><br />
      <select id="searchCuisine">
        <option value="">Any</option>
        <option>Italian</option>
        <option>Chinese</option>
        <option>Indian</option>
        <option>Mexican</option>
        <option>American</option>
        <option>French</option>
        <option>Other</option>
      </select>
    </div>
    <div>
      <label for="searchDifficulty">Difficulty</label><br />
      <select id="searchDifficulty">
        <option value="">Any</option>
        <option>Easy</option>
        <option>Medium</option>
        <option>Hard</option>
      </select>
    </div>
    <!-- <div>
      <label for="searchIngredient">Ingredient</label><br />
      <input id="searchIngredient" type="text" placeholder="e.g. Chicken" />
    </div> -->
    <button id="searchBtn" style="padding:8px 16px; background:#2c5530; color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">Search</button>
    <button id="clearBtn" style="padding:8px 16px; background:#ccc; color:#000; border:none; border-radius:6px; cursor:pointer;">Clear</button>
  </div>

  <div id="recipeList" class="recipe-list"></div>
</main>

<!-- Recipe Detail Modal -->
<div id="recipeModal">
  <div id="recipeModalContent">
    <button id="modalCloseBtn">Close</button>
    <h2 id="modalTitle"></h2>
    <div id="modalMeta"></div>

    <h3>Ingredients</h3>
    <div class="ingredients-section">
      Servings:
      <input type="number" id="servingsInput" min="1" style="width:60px;" />
      <button id="updateServingsBtn">Update</button>
    </div>
    <ul id="ingredientsList"></ul>

    <h3>Instructions</h3>
    <p id="instructionsText"></p>

    <h3>Reviews</h3>
    <div id="reviewsList"></div>

    <h4>Add Your Review</h4>
    <div id="reviewForm">
      <label for="reviewRating">Rating (1-5):</label>
      <input type="number" id="reviewRating" min="1" max="5" step="0.5" style="width:70px;" />
      <br />
      <label for="reviewComment">Comment:</label><br />
      <textarea id="reviewComment" rows="3" style="width:100%;"></textarea>
      <br />
      <button id="submitReviewBtn">Submit Review</button>
    </div>
  </div>
</div>

<!-- Leaderboard Modal -->
<div id="leaderboardModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); justify-content:center; align-items:center;">
  <div style="background:white; padding:1.5rem; border-radius:10px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto;">
    <button id="leaderboardClose" style="float:right; background:#b42e2e; color:white; border:none; border-radius:4px; padding:4px 8px; cursor:pointer;">Close</button>
    <h2>Chef Leaderboard</h2>
    <div id="leaderboardList"></div>
  </div>
</div>

<script>
  const APIBASE = '/api/';

  // Check authentication role
  const username = sessionStorage.getItem('username');
  const role = sessionStorage.getItem('user_role');
  if (!username || (role !== 'user' && role !== 'admin')) {
    window.location.href = 'login.html';
  }
  document.getElementById('usernameDisplay').textContent = username;

  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.clear();
    window.location.href = 'login.html';
  });

  // Leaderboard modal handlers
  const leaderboardModal = document.getElementById('leaderboardModal');
  const leaderboardList = document.getElementById('leaderboardList');

  async function openLeaderboard() {
    try {
      const res = await fetch('/api/leaderboard/admins');
      const rows = await res.json();
      if (!Array.isArray(rows) || rows.length === 0) {
        leaderboardList.innerHTML = '<p>No leaderboard data yet.</p>';
      } else {
        leaderboardList.innerHTML = '<ol>' + rows.map(r => `
          <li>
            <strong>${r.username}</strong> 
            </li>
        `).join('') + '</ol>';
      }
      leaderboardModal.style.display = 'flex';
    } catch (err) {
      console.error(err);
      leaderboardList.innerHTML = '<p>Failed to load leaderboard.</p>';
      leaderboardModal.style.display = 'flex';
    }
  }

  document.getElementById('leaderboardNav').addEventListener('click', openLeaderboard);
  document.getElementById('leaderboardClose').addEventListener('click', () => {
    leaderboardModal.style.display = 'none';
  });

  // Fetch and show recipe list, optionally with filters
  async function fetchRecipes(filters = {}) {
    try {
      let url;
      const params = new URLSearchParams();

      if (filters.q) params.append('q', filters.q);
      if (filters.cuisine) params.append('cuisine', filters.cuisine);
      if (filters.difficulty) params.append('difficulty', filters.difficulty);
      if (filters.ingredient) params.append('ingredient', filters.ingredient);

      if ([filters.q, filters.cuisine, filters.difficulty, filters.ingredient].some(v => v && v !== '')) {
        url = `${APIBASE}recipes/search?${params.toString()}`;
      } else {
        url = `${APIBASE}recipes`;
      }

      const res = await fetch(url);
      const recipes = await res.json();
      const container = document.getElementById('recipeList');
      if (!Array.isArray(recipes)) {
        console.error('Unexpected recipes payload:', recipes);
        alert('Failed to load recipes.');
        return;
      }

      container.innerHTML = recipes.map(r => {
        const avgRatingNum = Number(r.avg_rating || 0);
        const reviewCountNum = Number(r.review_count || 0);
        return `
        <div class="recipe-card" onclick="openRecipeModal(${r.recipe_id})">
          <h3>${r.recipe_name}</h3>
          <p><strong>Difficulty:</strong> <span class="difficulty ${r.difficulty.toLowerCase()}">${r.difficulty}</span></p>
          <p><strong>Cuisine:</strong> ${r.cuisine_type}</p>
          <p><strong>Rating:</strong> ${avgRatingNum.toFixed(2)} (${reviewCountNum} reviews)</p>
          <p><strong>Chef:</strong> ${r.chef_name || 'Unknown'}</p>
        </div>
      `;
      }).join('');
    } catch (error) {
      console.error(error);
      alert('Failed to load recipes.');
    }
  }

  // Open recipe modal with detail fetch
  let currentRecipe = null;
  async function openRecipeModal(id) {
    try {
      const res = await fetch(`${APIBASE}recipes/${id}/details`);
      const data = await res.json();
      const { recipe, ingredients, reviews } = data;

      currentRecipe = recipe;

      document.getElementById('modalTitle').textContent = recipe.recipe_name;
      document.getElementById('modalMeta').innerHTML = `
        <span class="difficulty ${recipe.difficulty.toLowerCase()}">${recipe.difficulty}</span>
        <span>${recipe.cuisine_type}</span> | 
        <span>Prep: ${recipe.prep_time} min</span> | 
        <span>Cook: ${recipe.cook_time} min</span> | 
        <span>Servings: ${recipe.servings}</span> | 
        <span>Rating: ${Number(recipe.avg_rating || 0).toFixed(2)} (${Number(recipe.review_count || 0)} reviews)</span>`;

      document.getElementById('servingsInput').value = recipe.servings;
      renderIngredients(ingredients);
      document.getElementById('instructionsText').textContent = recipe.instructions;
      renderReviews(reviews);
      document.getElementById('recipeModal').classList.add('active');
    } catch (err) {
      console.error(err);
      alert('Failed to load recipe details.');
    }
  }

  // Close modal
  document.getElementById('modalCloseBtn').addEventListener('click', () => {
    document.getElementById('recipeModal').classList.remove('active');
  });

  document.getElementById('updateServingsBtn').addEventListener('click', updateServings);

  // Submit review
  async function submitReview() {
    if (!currentRecipe) return;
    const userId = sessionStorage.getItem('user_id');
    if (!userId) {
      alert('You must be logged in to leave a review.');
      return;
    }
    const ratingVal = parseFloat(document.getElementById('reviewRating').value);
    const commentVal = document.getElementById('reviewComment').value.trim();
    if (!ratingVal || ratingVal < 1 || ratingVal > 5) {
      alert('Please enter a rating between 1 and 5.');
      return;
    }
    try {
      const res = await fetch(`${APIBASE}reviews`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          recipe_id: currentRecipe.recipe_id,
          user_id: Number(userId),
          rating: ratingVal,
          comment: commentVal || null
        })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || 'Failed to submit review');
      }
      // Clear form and refresh details (including reviews and averages)
      document.getElementById('reviewRating').value = '';
      document.getElementById('reviewComment').value = '';
      await openRecipeModal(currentRecipe.recipe_id);
    } catch (err) {
      console.error(err);
      alert('Failed to submit review.');
    }
  }

  document.getElementById('submitReviewBtn').addEventListener('click', submitReview);

  // Render ingredients
  function renderIngredients(ingredients) {
    const ul = document.getElementById('ingredientsList');
    ul.innerHTML = ingredients.map(i => `
      <li><strong>${i.quantity} ${i.unit}</strong> ${i.ingredient_name} (${i.category})</li>
    `).join('');
  }

  // Update ingredients when servings change
  async function updateServings() {
    if (!currentRecipe) return;
    const newServings = parseInt(document.getElementById('servingsInput').value, 10);
    if (!newServings || newServings <= 0) return;
    try {
      const res = await fetch(`${APIBASE}recipes/${currentRecipe.recipe_id}/adjusted-ingredients/${newServings}`);
      const adjusted = await res.json();
      const ul = document.getElementById('ingredientsList');
      ul.innerHTML = adjusted.map(i => `
        <li><strong>${i.qty_for_new_servings} ${i.unit}</strong> ${i.ingredient_name} (${i.category})</li>
      `).join('');
    } catch (err) {
      console.error(err);
      alert('Failed to update ingredients for new servings.');
    }
  }

  // Render reviews
  function renderReviews(reviews) {
    const container = document.getElementById('reviewsList');
    if (reviews.length === 0) {
      container.innerHTML = '<p>No reviews yet.</p>';
      return;
    }
    container.innerHTML = reviews.map(r => {
      const ratingNum = Number(r.rating || 0);
      return `
      <div>
        <strong>${r.username}</strong> 
        <span>rated ${ratingNum.toFixed(1)}</span>
        <p>${r.comment || ''}</p>
        <small>${new Date(r.review_date).toLocaleDateString()}</small>
      </div>
    `;
    }).join('');
  }

  // Wire up search buttons
  document.getElementById('searchBtn').addEventListener('click', () => {
    const filters = {
      q: document.getElementById('searchName').value.trim(),
      cuisine: document.getElementById('searchCuisine').value,
      difficulty: document.getElementById('searchDifficulty').value,
      // ingredient: document.getElementById('searchIngredient').value.trim()
    };
    fetchRecipes(filters);
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('searchName').value = '';
    document.getElementById('searchCuisine').value = '';
    document.getElementById('searchDifficulty').value = '';
    // document.getElementById('searchIngredient').value = '';
    fetchRecipes();
  });

  // Initial load
  fetchRecipes();
</script>
</body>
</html>
